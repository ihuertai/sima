<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Resultado del Envío</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="bg-light">

<div class="container py-5">



    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="titulo-sima mb-0">SIMA</h1>

        <div class="d-flex gap-2">

            <a href="/dashboard" class="btn btn-primary">
                Menú
            </a>


            <a href="/clientes/nuevo" class="btn btn-primary">
                Clientes
            </a>
            <a href="/clientes/lista" class="btn btn-primary">
                Lista de clientes
            </a>
            <a href="/anuncios/nuevo" class="btn btn-primary">
                Anuncios
            </a>
            <a href="/anuncios/lista" class="btn btn-primary">
                Lista de anuncio
            </a>
            <a href="/envio" class="btn btn-primary">
                Enviar
            </a>

        </div>
    </div>


    <div class="card shadow-sm text-center">

        <div class="card-body py-5">

            <h3 class="mb-4" th:text="${resultado}"></h3>

            <a href="/envio" class="btn btn-primary">
                Volver a enviar
            </a>

        </div>

    </div>

</div>

</body>
</html>
