<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro de Anuncio</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="titulo-sima mb-0">SIMA</h1>
        <div class="d-flex gap-2">
            <a href="/dashboard" class="btn btn-primary">Men&uacute;</a>
            <a href="/clientes/lista" class="btn btn-primary">Lista de clientes</a>
            <a href="/anuncios/lista" class="btn btn-primary">Lista de anuncios</a>
            <a href="/envio/lista" class="btn btn-primary">Campa&ntilde;as</a>
            <a href="/auth/logout" class="btn btn-outline-danger">Cerrar sesi&oacute;n</a>
        </div>
    </div>

    <h3 class="mb-4" th:text="${anuncio.id != null ? 'Editar Anuncio' : 'Registrar Anuncio'}">Registrar Anuncio</h3>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/anuncios/guardar}" th:object="${anuncio}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">T&iacute;tulo</label>
                        <input type="text" class="form-control" th:field="*{titulo}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Gerente responsable</label>
                        <select class="form-select" th:field="*{creadoPor.id}" required>
                            <option value="">Selecciona</option>
                            <option th:each="gerente : ${gerentes}" th:value="${gerente.id}" th:text="${gerente.nombre}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Texto del anuncio</label>
                        <textarea class="form-control" rows="4" th:field="*{texto}" required></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Imagen (URL p&uacute;blica)</label>
                        <input type="text" class="form-control" th:field="*{imagen}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tipo de informaci&oacute;n extra</label>
                        <select class="form-select" th:field="*{informacionExtraTipo}">
                            <option value="">Selecciona</option>
                            <option th:each="tipo : ${tiposExtra}" th:value="${tipo}" th:text="${tipo}"></option>
                        </select>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Valor de informaci&oacute;n extra</label>
                        <input type="text" class="form-control" th:field="*{informacionExtraValor}" placeholder="URL, texto o recurso adicional">
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary" th:text="${anuncio.id != null ? 'Guardar cambios' : 'Guardar'}">Guardar</button>
                    <a href="/anuncios/lista" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
