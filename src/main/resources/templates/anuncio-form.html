<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registro de Anuncio</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="bg-light">

<div class="container py-5">


    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="titulo-sima mb-0">SIMA</h1>

        <div class="d-flex gap-2">

            <a href="/dashboard" class="btn btn-primary">
                Menú
            </a>

            <a href="/clientes/nuevo" class="btn btn-primary">
                Clientes
            </a>

            <a href="/clientes/lista" class="btn btn-primary">
                Lista de clientes
            </a>
            <a href="/anuncios/lista" class="btn btn-primary">
                Lista de anuncio
            </a>
            <a href="/envio" class="btn btn-primary">
                Enviar
            </a>

        </div>

    </div>



    <h3 class="mb-4">Registrar Anuncio</h3>



    <div class="card shadow-sm">

        <div class="card-body">

            <form th:action="@{/anuncios/guardar}" th:object="${anuncio}" method="post">

                <div class="mb-3">
                    <label class="form-label">Texto del anuncio</label>
                    <input type="text" class="form-control" th:field="*{texto}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Imagen (URL)</label>
                    <input type="text" class="form-control" th:field="*{imagen}">
                </div>

                <div class="mb-4">
                    <label class="form-label">Fecha de publicación</label>
                    <input type="date" class="form-control" th:field="*{fechaPublicacion}">
                </div>

                <button type="submit" class="btn btn-primary">
                    Guardar
                </button>

                <a href="/anuncios/lista" class="btn btn-secondary ms-2">
                    Cancelar
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
