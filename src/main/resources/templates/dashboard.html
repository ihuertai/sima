<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard SIMA</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            padding: 40px;
        }
        h1 {
            color: #1e293b;
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(2, 250px);
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
        }
        a {
            text-decoration: none;
            font-weight: bold;
            color: #2563eb;
        }
    </style>
</head>
<body>

<h1>SIMA</h1>

<div class="menu">

    <div class="card">
        <h3>Gestión de Clientes</h3>
        <a href="/clientes/lista">Ver Clientes</a><br><br>
        <a href="/clientes/nuevo">Agregar Cliente</a>
    </div>

    <div class="card">
        <h3>Gestión de Anuncios</h3>
        <a href="/anuncios/lista">Ver Anuncios</a><br><br>
        <a href="/anuncios/nuevo">Crear Anuncio</a>
    </div>

    <div class="card">
        <h3>Envío de Mensajes</h3>
        <a href="/envio">Enviar Anuncio por WhatsApp</a>
    </div>

</div>

</body>
</html>
