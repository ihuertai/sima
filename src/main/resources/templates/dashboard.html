<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SIMA Dashboard</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">


</head>

<body class="bg-light">

<div class="container py-5">

    <h1 class="mb-4 titulo-sima">SIMA</h1>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Gestión de Clientes</h5>

                    <a href="/clientes/lista" class="btn btn-primary w-100 mb-2">
                        Ver Clientes
                    </a>

                    <a href="/clientes/nuevo" class="btn btn-primary w-100">
                        Agregar Cliente
                    </a>

                </div>
            </div>
        </div>


        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Gestión de Anuncios</h5>

                    <a href="/anuncios/lista" class="btn btn-primary w-100 mb-2">
                        Ver Anuncios
                    </a>

                    <a href="/anuncios/nuevo" class="btn btn-primary w-100">
                        Crear Anuncio
                    </a>

                </div>
            </div>
        </div>


        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Envío de Mensajes</h5>

                    <a href="/envio" class="btn btn-primary w-100">
                        Enviar Anuncio por WhatsApp
                    </a>

                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
