<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Lista de Anuncios</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="bg-light">

<div class="container py-5">


        <div class="d-flex justify-content-between align-items-center mb-4">

            <h1 class="titulo-sima mb-0">SIMA</h1>

            <div class="d-flex gap-2">

                <a href="/dashboard" class="btn btn-primary">
                    Menú
                </a>


                <a href="/clientes/nuevo" class="btn btn-primary">
                    Clientes
                </a>
                <a href="/clientes/lista" class="btn btn-primary">
                    Lista de clientes
                </a>




                <a href="/envio" class="btn btn-primary">
                    Enviar
                </a>

            </div>
        </div>




    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3 class="mb-0">Lista de Anuncios</h3>

        <a href="/anuncios/nuevo" class="btn btn-primary">
            Crear Anuncio
        </a>

    </div>



    <div class="card shadow-sm">

        <div class="card-body">

            <table class="table table-striped table-hover mb-0">

                <thead class="table-light">
                <tr>
                    <th>Texto</th>
                    <th>Imagen</th>
                    <th>Fecha</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="a : ${anuncios}">
                    <td th:text="${a.texto}"></td>
                    <td th:text="${a.imagen}"></td>
                    <td th:text="${a.fechaPublicacion}"></td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
